<!DOCTYPE html> 

<html> 

<head> 

    <title>Lost Property Items</title> 

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> 

</head> 

<body> 

    <div class="container"> 

        <h1>Lost Property Items</h1> 

        {% if items %} 

            <table> 

                <tr> 

                    <th>ID</th> 

                    <th>Item Name</th> 

                    <th>Location Found</th> 

                    <th>Date Found</th> 

                    <th>Description</th> 

                </tr> 

                {% for item in items %} 

                <tr> 

                    <td>{{ item[0] }}</td> 

                    <td>{{ item[1] }}</td> 

                    <td>{{ item[2] }}</td> 

                    <td>{{ item[3] }}</td> 

                    <td>{{ item[4] }}</td> 

                </tr> 

                {% endfor %} 

            </table> 

        {% else %} 

            <p>No lost property items have been recorded yet.</p> 

        {% endif %} 

        <a href="/">Add Another Item</a> 

    </div> 

</body> 

</html>
